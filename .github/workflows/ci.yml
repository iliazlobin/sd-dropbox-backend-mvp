name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install docker compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
      - name: Source manifest and run
        run: |
          set -a
          source verify/manifest.env
          set +a
          eval "$UP"
          eval "$READY"
          eval "$TEST_DEPS"
          eval "$ACCEPTANCE"
      - name: Tear down
        if: always()
        run: |
          set -a
          source verify/manifest.env
          set +a
          eval "$DOWN"
