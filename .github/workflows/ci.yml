name: CI

"on":
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install docker compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Source manifest and run e2e
        run: |
          set -e
          source verify/manifest.env
          eval "$UP" || { docker compose logs --tail=100; exit 1; }
          eval "$READY" || { docker compose logs --tail=100; exit 1; }
          eval "$TEST_DEPS"
          eval "$ACCEPTANCE" || { docker compose logs --tail=100; exit 1; }
          eval "$DOWN"
